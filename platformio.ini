; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Shared base configuration
[env]
platform = espressif8266@4.2.0
board = d1_mini
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m2m.ld
lib_deps =
	adafruit/Adafruit NeoPixel@^1.12.3
	me-no-dev/ESPAsyncTCP@^1.2.2
	me-no-dev/ESPAsyncWebServer@^1.2.3
	bblanchon/ArduinoJson@^7.0.0
build_flags =
	-D NUM_LEDS=60
	-D LED_PIN=D4
	-D BTN1_PIN=D5
	-D BTN2_PIN=D6
	-D HOSTNAME=\"LedController\"
	-D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH

; Serial upload (USB)
[env:d1_mini]
upload_speed = 921600
extra_scripts =
	pre:scripts/auto_version.py
	post:scripts/post_upload_smoke_test.py

; OTA upload (WiFi) — use: pio run -e d1_mini_ota -t upload
[env:d1_mini_ota]
upload_protocol = espota
upload_port = ledclock.local
upload_flags = --auth=admin123
extra_scripts =
	pre:scripts/auto_version.py
	post:scripts/post_upload_smoke_test.py

; OTA stress test — run with: pio run -e ota_stress -t ota_stress_test
[env:ota_stress]
OTA_STRESS_SERIAL = auto
extra_scripts =
	scripts/ota_stress_test.py

; Native host environment — unit tests only (no embedded hardware required)
; Run with: pio test -e native
[env:native]
platform = native
build_flags = -std=c++17
test_build_src = no
